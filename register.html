<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Memuat Event... | SCS</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans antialiased">

    <!-- Loading State -->
    <div id="loadingState" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <span class="text-6xl animate-pulse mb-4">🏊‍♂️</span>
        <h2 class="text-xl font-bold text-gray-500">Mencari Data Lomba...</h2>
    </div>

    <!-- Error State (Kalau Subdomain Salah/Tidak Ada) -->
    <div id="errorState" class="hidden flex-col items-center justify-center min-h-screen bg-white text-center p-6">
        <span class="text-7xl mb-4">🤷‍♂️</span>
        <h1 class="text-3xl font-extrabold text-blue-900 mb-2">Event Tidak Ditemukan</h1>
        <p class="text-gray-500 mb-6">Pastikan link / subdomain yang Anda masukkan sudah benar.</p>
        <a href="/" class="bg-blue-900 text-white px-6 py-2 rounded-full font-bold">Kembali ke Beranda</a>
    </div>

    <!-- Konten Utama Lomba -->
    <div id="mainContent" class="hidden">
        <!-- Hero Section Lomba -->
        <header class="bg-blue-900 text-white pt-16 pb-12 px-4 rounded-b-[3rem] shadow-lg text-center relative overflow-hidden">
            <div class="absolute inset-0 opacity-10 bg-[url('https://images.unsplash.com/photo-1530549387789-4c1017266635?auto=format&fit=crop&w=800&q=80')] bg-cover bg-center"></div>
            <div class="relative z-10 max-w-3xl mx-auto">
                <span class="bg-yellow-500 text-blue-900 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-widest mb-4 inline-block">Pendaftaran Resmi</span>
                <h1 id="eventTitle" class="text-3xl md:text-5xl font-extrabold mb-4 leading-tight">Nama Lomba</h1>
                <p class="text-blue-200 text-lg md:text-xl font-medium">Diselenggarakan oleh: <span id="eventOrganizer" class="text-white font-bold">Memuat...</span></p>
            </div>
        </header>

        <!-- Form Pendaftaran -->
        <main class="max-w-2xl mx-auto -mt-6 px-4 pb-20 relative z-20">
            <div class="bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-gray-100">
                
                <div class="flex justify-between items-center mb-8 border-b border-gray-100 pb-4">
                    <div>
                        <p class="text-sm text-gray-500 font-bold uppercase">Biaya Pendaftaran</p>
                        <p id="eventPrice" class="text-2xl font-extrabold text-green-600">Rp 0 / Atlet</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-gray-500 font-bold uppercase">Status</p>
                        <p class="text-lg font-bold text-blue-600">DIBUKA</p>
                    </div>
                </div>

                <!-- Form Dummy untuk Simulasi -->
                <form class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Nama Lengkap Atlet</label>
                        <input type="text" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 bg-gray-50" placeholder="Sesuai Akta Kelahiran">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Tanggal Lahir (Auto-Lock KU)</label>
                        <input type="date" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 bg-gray-50">
                    </div>

                    <button type="button" class="w-full bg-blue-900 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-800 transition-all shadow-md mt-4">
                        Daftarkan Atlet
                    </button>
                </form>

            </div>
        </main>
    </div>

    <script type="module" src="/src/register.js"></script>
</body>
</html>
