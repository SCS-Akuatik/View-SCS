<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCS - Dashboard Terpadu</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <!-- Top Nav -->
    <nav class="bg-white shadow-sm p-4 flex justify-between items-center border-b">
        <div class="flex items-center gap-3">
            <img src="/images/logo.png" alt="SCS Logo" class="h-10">
            <h1 class="text-xl font-bold text-blue-900 hidden sm:block">SCS Dashboard</h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-sm font-semibold text-gray-800" id="clubNameDisplay">Memuat data...</span>
            <button id="logoutBtn" class="text-red-500 text-sm font-bold hover:underline ml-2 border border-red-200 px-3 py-1 rounded-lg bg-red-50">Keluar</button>
        </div>
    </nav>

    <!-- Content -->
    <div class="p-6 max-w-5xl mx-auto mt-4">
        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl shadow-sm hover:shadow-md transition duration-300 border border-gray-100 flex flex-col justify-between">
                <div>
                    <p class="text-gray-500 text-xs font-bold uppercase mb-1">Total Pendaftar</p>
                    <p class="text-3xl font-extrabold text-gray-800" id="totalAthletes">0 <span class="text-sm font-normal text-gray-400">Atlet</span></p>
                </div>
                <!-- Empty State Polish -->
                <p class="text-xs text-gray-400 mt-3 italic leading-tight">Belum ada atlet terdaftar. Yuk buat event pertama!</p>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm hover:shadow-md transition duration-300 border border-gray-100 flex flex-col justify-between">
                <div>
                    <p class="text-gray-500 text-xs font-bold uppercase mb-1">Total Kebutuhan Dana</p>
                    <p class="text-3xl font-extrabold text-green-600" id="totalRevenue">Rp 0</p>
                </div>
            </div>
        </div>

        <!-- Menu Utama -->
        <h2 class="text-xl font-extrabold text-blue-900 mb-4">Aksi Cepat</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-10">
            
            <!-- Card 1: Buat Event (Primary Action) -->
            <button id="btnBuatEvent" class="bg-blue-900 text-white p-6 rounded-2xl text-left shadow-lg hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1 relative overflow-hidden group">
                <!-- Badge FREE -->
                <span class="absolute top-4 right-4 bg-gradient-to-r from-emerald-400 to-emerald-500 text-white text-[10px] font-extrabold px-3 py-1 rounded-full tracking-wider shadow-sm border border-emerald-300">FREE TEMPLATE</span>
                
                <span class="text-4xl block mb-3 group-hover:scale-110 transition-transform origin-left">🚀</span>
                <h3 class="font-bold text-lg">Buat Event Baru</h3>
                <p class="text-blue-200 text-sm mt-1">Buat halaman pendaftaran event dalam 1 klik</p>
            </button>
            
            <!-- Card 2: Sponsor (Secondary Action) -->
            <button id="btnSponsor" class="bg-yellow-500 text-white p-6 rounded-2xl text-left shadow-lg hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1 relative overflow-hidden group">
                <div class="flex justify-between items-start">
                    <div class="pr-2">
                        <span class="text-4xl block mb-3 group-hover:scale-110 transition-transform origin-left">🤝</span>
                        <h3 class="font-bold text-lg">Ajukan Sponsor</h3>
                        <p class="text-yellow-100 text-sm mt-1">Kelola daftar sponsor & slot iklan event</p>
                    </div>
                    <!-- Grid Logo Placeholder -->
                    <div class="grid grid-cols-2 gap-1.5 opacity-30 mt-1">
                        <div class="w-6 h-6 bg-yellow-900 rounded-md"></div>
                        <div class="w-6 h-6 bg-yellow-900 rounded-md"></div>
                        <div class="w-6 h-6 bg-yellow-900 rounded-md"></div>
                        <div class="w-6 h-6 bg-yellow-900 rounded-md"></div>
                    </div>
                </div>
            </button>

            <!-- Card 3: Juri -->
            <button id="btnJuri" class="bg-emerald-600 text-white p-6 rounded-2xl text-left shadow-lg hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1 group">
                <span class="text-4xl block mb-3 group-hover:scale-110 transition-transform origin-left">⚖️</span>
                <h3 class="font-bold text-lg">Call Juri Pro</h3>
                <p class="text-emerald-100 text-sm mt-1">Sewa tim wasit berlisensi</p>
            </button>
        </div>

        <!-- Event List -->
        <h2 class="text-xl font-extrabold text-blue-900 mb-4">Event Aktif Anda</h2>
        <div id="eventContainer" class="space-y-4">
            <div id="loadingState" class="text-center py-10 text-gray-500">Mengecek daftar kompetisi...</div>
        </div>
    </div>

    <!-- PANGGIL LOGIC JAVASCRIPT DISINI -->
    <script type="module" src="/src/dashboard.js"></script>
</body>
</html>
