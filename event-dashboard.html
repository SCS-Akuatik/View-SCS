                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-4">

                        </div>
                        <div>

                            <p class="text-[10px] md:text-xs text-slate-500 leading-tight">Desain visual web promosi event.</p>
                        </div>
                    </button>

                    <!-- Config Card: Entry Time -->
                    <button class="group relative bg-white rounded-xl p-3 md:p-5 shadow-sm border border-slate-200 hover:shadow-md hover:border-orange-300 transition-all duration-200 text-left flex flex-col justify-between h-full">
                        <span class="absolute top-2 right-2 md:top-3 md:right-3 px-1.5 py-0.5 md:px-2 md:py-0.5 bg-slate-100 text-slate-500 text-[9px] md:text-[10px] font-bold rounded-md flex items-center gap-0.5 md:gap-1 border border-slate-200">

                    <!-- Config Card: Pengaturan Harga -->

                        <span class="absolute top-2 right-2 md:top-3 md:right-3 px-1.5 py-0.5 md:px-2 md:py-0.5 bg-emerald-100 text-emerald-700 text-[9px] md:text-[10px] font-bold rounded-md flex items-center gap-0.5 md:gap-1 border border-emerald-200">

                            <svg class="w-2.5 h-2.5 md:w-3 md:h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
